<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTÁTICA</title>
<meta name="description" content="">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:type" content="article">
<meta property="og:image" content="">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --crema: #f5f0e8;
  --negro: #0e0c0a;
  --gris:  #6a6560;
  --borde: rgba(14,12,10,0.1);
  --trabajo:    #f5df00;
  --actualidad: #ff2566;
  --lgbtq:      #3d5aff;
  --salud:      #00d46a;
  --personal:   #ff5200;
}

html { scroll-behavior: smooth; }
body {
  background: var(--crema);
  color: var(--negro);
  font-family: 'Space Grotesk', sans-serif;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.035;
  pointer-events: none;
  z-index: 999;
}

/* PATTERNS */
.pat-lines { background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.07) 0, rgba(0,0,0,0.07) 1px, transparent 0, transparent 50%); background-size: 12px 12px; }
.pat-dots { background-image: radial-gradient(circle, rgba(0,0,0,0.15) 1.5px, transparent 1.5px); background-size: 18px 18px; }
.pat-grid { background-image: linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px); background-size: 22px 22px; }
.pat-zigzag { background-image: linear-gradient(135deg, rgba(0,0,0,0.07) 25%, transparent 25%) -10px 0, linear-gradient(225deg, rgba(0,0,0,0.07) 25%, transparent 25%) -10px 0, linear-gradient(315deg, rgba(0,0,0,0.07) 25%, transparent 25%), linear-gradient(45deg, rgba(0,0,0,0.07) 25%, transparent 25%); background-size: 20px 20px; }
.pat-arcs { background-image: radial-gradient(circle at 0 0, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 41px, transparent 41px), radial-gradient(circle at 100% 100%, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 41px, transparent 41px); background-size: 80px 80px; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  padding: 1rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.4s, backdrop-filter 0.4s, box-shadow 0.4s, border-radius 0.4s, top 0.4s, left 0.4s, right 0.4s, padding 0.4s;
}
nav.scrolled {
  background: rgba(245,240,232,0.88);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  box-shadow: 0 2px 24px rgba(14,12,10,0.08);
  border-bottom: 1px solid var(--borde);
}
@media (max-width: 767px) {
  nav.scrolled { top:0.6rem; left:0.6rem; right:0.6rem; border-radius:14px; padding:0.8rem 1.1rem; border:1px solid var(--borde); }
}
.nav-logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 16px; font-weight: 900;
  letter-spacing: -0.02em; color: var(--negro);
  text-decoration: none;
}
.nav-back {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gris); text-decoration: none;
  display: flex; align-items: center; gap: 0.4rem;
  transition: color 0.15s;
}
.nav-back:hover { color: var(--negro); }

/* HERO */
.post-hero {
  min-height: 70svh;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 0; position: relative; overflow: hidden;
}
.post-hero-bg {
  position: absolute; inset: 0;
}
.post-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(14,12,10,0.9) 0%, rgba(14,12,10,0.4) 50%, rgba(14,12,10,0.15) 100%);
  z-index: 1;
}
.post-hero-content {
  position: relative; z-index: 2;
  padding: 2.5rem 1.5rem 2.5rem;
}
.post-cat {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 0.3rem 0.85rem; border-radius: 100px;
  margin-bottom: 1.25rem;
}
.post-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 8vw, 60px);
  font-weight: 400; font-style: italic;
  color: var(--crema); line-height: 1.08;
  letter-spacing: -0.01em; margin-bottom: 1.25rem;
}
.post-meta {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 0.75rem; font-size: 12px;
  color: rgba(245,240,232,0.5); letter-spacing: 0.04em;
}
.post-meta-sep { opacity: 0.4; }

/* TAGS */
.post-tags {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  margin-top: 1rem;
}
.post-tag {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.25rem 0.65rem; border-radius: 100px;
  border: 1.5px solid rgba(245,240,232,0.25);
  color: rgba(245,240,232,0.5);
}

/* CONTENT */
.post-body {
  max-width: 680px; margin: 0 auto;
  padding: 3rem 1.5rem 5rem;
}
.post-content {
  font-family: 'Lora', serif;
  font-size: 18px; line-height: 1.85;
  color: var(--negro);
}
.post-content p { margin-bottom: 1.5rem; }
.post-content h2 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(24px, 5vw, 32px);
  font-style: italic; font-weight: 400;
  color: var(--negro); line-height: 1.2;
  margin: 2.5rem 0 1rem;
  letter-spacing: -0.01em;
}
.post-content h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  margin: 2rem 0 0.75rem;
}
.post-content ul, .post-content ol {
  padding-left: 1.5rem; margin-bottom: 1.5rem;
}
.post-content li { margin-bottom: 0.5rem; }
.post-content strong { font-weight: 600; }
.post-content em { font-style: italic; }
.post-content a { color: inherit; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }

/* Pull quote */
.post-content blockquote {
  border-left: 3px solid var(--negro);
  padding: 0.5rem 0 0.5rem 1.5rem;
  margin: 2rem 0;
}
.post-content blockquote p {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(20px, 4vw, 26px);
  font-style: italic; font-weight: 400;
  color: var(--negro); line-height: 1.4;
  margin-bottom: 0;
}

/* Color pull quote */
.pull-quote {
  margin: 2.5rem -1.5rem;
  padding: 2rem 1.5rem;
  font-family: 'DM Serif Display', serif;
  font-size: clamp(22px, 5vw, 32px);
  font-style: italic; font-weight: 400;
  line-height: 1.35; color: var(--negro);
}

/* Divider */
.post-divider {
  width: 40px; height: 2px;
  background: var(--negro);
  margin: 2.5rem 0;
}

/* BACK SECTION */
.post-back {
  padding: 2rem 1.5rem; max-width: 680px; margin: 0 auto;
  padding-bottom: 3rem;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--borde);
}
.back-link {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--negro); text-decoration: none;
  display: flex; align-items: center; gap: 0.5rem;
  transition: gap 0.2s;
}
.back-link:hover { gap: 0.75rem; }

/* RELATED POSTS */
.related-section {
  background: var(--negro);
  padding: 3rem 1.5rem 4rem;
  margin-top: 3px;
}
.related-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: rgba(245,240,232,0.3); margin-bottom: 1.75rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.related-label::before { content:''; width:18px; height:1px; background:rgba(245,240,232,0.2); }
.related-grid {
  display: grid; grid-template-columns: 1fr; gap: 3px;
}
.related-card {
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; justify-content: flex-end;
  position: relative; overflow: hidden;
  min-height: 160px; padding: 1.5rem;
  transition: opacity 0.2s;
}
.related-card:hover { opacity: 0.88; }
.related-pat-lines { background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.07) 0, rgba(0,0,0,0.07) 1px, transparent 0, transparent 50%); background-size: 12px 12px; }
.related-pat-dots  { background-image: radial-gradient(circle, rgba(0,0,0,0.15) 1.5px, transparent 1.5px); background-size: 18px 18px; }
.related-pat-grid  { background-image: linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px); background-size: 22px 22px; }
.related-pat-zigzag { background-image: linear-gradient(135deg, rgba(0,0,0,0.07) 25%, transparent 25%) -10px 0, linear-gradient(225deg, rgba(0,0,0,0.07) 25%, transparent 25%) -10px 0, linear-gradient(315deg, rgba(0,0,0,0.07) 25%, transparent 25%), linear-gradient(45deg, rgba(0,0,0,0.07) 25%, transparent 25%); background-size: 20px 20px; }
.related-pat-arcs  { background-image: radial-gradient(circle at 0 0, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 41px, transparent 41px); background-size: 80px 80px; }
.related-cat {
  display: inline-flex; font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 0.22rem 0.65rem; border-radius: 100px;
  margin-bottom: 0.6rem; position: relative; z-index: 1;
}
.related-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(18px, 4vw, 22px);
  font-weight: 400; font-style: italic;
  color: var(--negro); line-height: 1.2;
  position: relative; z-index: 1;
}
.related-meta {
  font-size: 11px; color: rgba(14,12,10,0.4);
  margin-top: 0.4rem; position: relative; z-index: 1;
  letter-spacing: 0.04em;
}

/* FOOTER */
footer {
  background: var(--negro); padding: 2.5rem 1.5rem;
}
.footer-logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 24px; font-weight: 900;
  color: var(--crema); letter-spacing: -0.02em;
  margin-bottom: 1rem; text-decoration: none; display: block;
}
.footer-copy { font-size: 11px; color: rgba(245,240,232,0.2); letter-spacing: 0.06em; }

/* READING PROGRESS BAR */
.reading-progress {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  width: 0%;
  z-index: 300;
  transition: width 0.08s linear;
  box-shadow: 0 0 8px currentColor;
}

/* SHARE */
.share-section {
  max-width: 680px; margin: 0 auto;
  padding: 0 1.5rem 2rem;
}
.share-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(14,12,10,0.35); margin-bottom: 0.85rem;
}
.share-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.share-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.6rem 1.25rem; border-radius: 100px;
  text-decoration: none; transition: all 0.15s;
  border: 1.5px solid var(--borde); color: var(--negro);
}
.share-btn:hover { background: var(--negro); color: var(--crema); border-color: var(--negro); }
.share-btn-wsp:hover { background: #25d366; border-color: #25d366; }
.share-btn-x:hover   { background: var(--negro); border-color: var(--negro); }
.not-found {
  min-height: 80vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 2rem;
}
.not-found-title {
  font-family: 'DM Serif Display', serif;
  font-size: 48px; font-style: italic; margin-bottom: 1rem;
}
.not-found-sub { color: var(--gris); font-size: 15px; margin-bottom: 2rem; }

@media (min-width: 768px) {
  nav { padding: 1.25rem 3rem; }
  .post-hero-content { padding: 4rem 3rem 3.5rem; }
  .post-body { padding: 4rem 3rem 6rem; }
  .share-section { padding: 0 3rem 2rem; }
  .pull-quote { margin: 2.5rem 0; padding: 2rem 2.5rem; }
  .related-section { padding: 4rem 3rem 5rem; }
  .related-grid { grid-template-columns: repeat(3, 1fr); }
  .post-back { padding: 2rem 3rem; }
}

/* ═══════════════════════
   DARK MODE
═══════════════════════ */
html.dark body { background: #0c0a08; color: #f5f0e8; }
html.dark nav.scrolled {
  background: rgba(12,10,8,0.9) !important;
  border-color: rgba(245,240,232,0.06) !important;
  box-shadow: 0 2px 24px rgba(0,0,0,0.4) !important;
}

/* Cards */
html.dark .post-card.card-text-only { background: #161412 !important; }

/* Post body */
html.dark .post-body { background: #0c0a08; }
html.dark .post-content { color: #f5f0e8; }
html.dark .post-content h2,
html.dark .post-content h3 { color: #f5f0e8; }
html.dark .post-content blockquote { border-color: rgba(245,240,232,0.3); }
html.dark .post-content blockquote p { color: rgba(245,240,232,0.8); }
html.dark .post-back {
  border-color: rgba(245,240,232,0.08);
  background: #0c0a08;
}
html.dark .back-link { color: #f5f0e8; }
html.dark .share-section { background: #0c0a08; }
html.dark .share-btn { color: #f5f0e8; border-color: rgba(245,240,232,0.12); }
html.dark .share-btn:hover { background: #f5f0e8; color: #0c0a08; border-color: #f5f0e8; }

/* Related */
html.dark .related-title { color: #0c0a08; }

/* FAQ (index) */
html.dark .faq-section { background: #0c0a08; }
html.dark .faq-section .section-title-light { color: #f5f0e8; }
html.dark .faq-q { color: #f5f0e8; }
html.dark .faq-a { color: rgba(245,240,232,0.5); }
html.dark .faq-item { border-color: rgba(245,240,232,0.08); }
html.dark .faq-list { border-color: rgba(245,240,232,0.08); }

/* Grid divider */
html.dark .section-divider { background: #0c0a08; }
html.dark .divider-label,
html.dark .divider-count { color: rgba(245,240,232,0.25); }
html.dark .divider-label::before { background: rgba(245,240,232,0.08); }

/* Cat filter mobile */
html.dark .cat-filter { background: #0c0a08; }
html.dark .cat-btn { color: #f5f0e8; border-color: rgba(245,240,232,0.15); }
html.dark .cat-btn.active { background: #f5f0e8; color: #0c0a08; border-color: #f5f0e8; }

/* Sobre */
html.dark .sobre-content { background: #0c0a08; }
html.dark .sobre-intro { color: #f5f0e8; }
html.dark .sobre-body { color: #f5f0e8; }
html.dark .sobre-divider { background: rgba(245,240,232,0.2); }
html.dark .sobre-redes { border-color: rgba(245,240,232,0.08); }
html.dark .sobre-redes-title { color: rgba(245,240,232,0.3); }
html.dark .red-link { color: #f5f0e8; border-color: rgba(245,240,232,0.15); }
html.dark .red-link:hover { background: #f5f0e8; color: #0c0a08; }

/* Search overlay - already dark, keep as is */

/* Empty state */
html.dark .empty-state { background: #0c0a08; }
html.dark .empty-title { color: #f5f0e8; }
html.dark .empty-sub { color: rgba(245,240,232,0.4); }

/* Other cats (categoria.html) */
html.dark .other-cats { background: #0c0a08; }
html.dark .other-cats-label { color: rgba(245,240,232,0.25); }
html.dark .other-cat-link { color: #f5f0e8; border-color: rgba(245,240,232,0.15); }
html.dark .other-cat-link:hover { background: #f5f0e8; color: #0c0a08; }

/* Dark toggle button */
.nav-dark-btn {
  background: none; border: none; cursor: pointer;
  font-size: 15px; padding: 4px;
  line-height: 1; transition: transform 0.2s;
  border: 1.5px solid var(--borde);
  border-radius: 100px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
.nav-dark-btn:hover { transform: rotate(20deg); }


/* STICKY READING HEADER */
.sticky-read {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 198;
  background: rgba(245,240,232,0.96);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transform: translateY(-100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  padding: 0.7rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  border-bottom: 1px solid var(--borde);
  margin-top: 54px;
}
.sticky-read.visible { transform: translateY(0); }
.sticky-read-title {
  font-family: 'DM Serif Display', serif;
  font-size: 14px; font-style: italic;
  color: var(--negro); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
.sticky-read-right {
  display: flex; align-items: center; gap: 0.75rem;
  flex-shrink: 0;
}
.sticky-read-min {
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em; color: var(--gris);
  white-space: nowrap;
}
.sticky-read-bar-wrap {
  width: 80px; height: 3px;
  background: var(--borde); border-radius: 2px;
  overflow: hidden;
}
.sticky-read-bar {
  height: 100%; width: 0%;
  border-radius: 2px;
  transition: width 0.1s linear;
}

html.dark .sticky-read {
  background: rgba(12,10,8,0.96);
  border-color: rgba(245,240,232,0.06);
}
html.dark .sticky-read-title { color: var(--crema); }
html.dark .sticky-read-bar-wrap { background: rgba(245,240,232,0.08); }

/* CLICKABLE TAGS */
a.post-tag {
  text-decoration: none;
  transition: opacity 0.15s, background 0.15s;
}
a.post-tag:hover { opacity: 0.75; }

/* GISCUS COMMENTS */
.comments-section {
  max-width: 680px; margin: 0 auto;
  padding: 0 1.5rem 4rem;
}
.comments-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: rgba(14,12,10,0.35); margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.comments-label::before { content:''; width:18px; height:1px; background:var(--borde); }
.comments-setup {
  background: var(--borde);
  border: 1.5px dashed rgba(14,12,10,0.15);
  padding: 1.5rem;
  font-size: 13px; color: var(--gris); line-height: 1.7;
}
.comments-setup a { color: var(--negro); }
html.dark .comments-section { background: #0c0a08; }
html.dark .comments-label { color: rgba(245,240,232,0.25); }
html.dark .comments-label::before { background: rgba(245,240,232,0.08); }

@media (min-width: 768px) {
  .sticky-read { padding: 0.7rem 3rem; margin-top: 60px; }
  .sticky-read-bar-wrap { width: 120px; }
  .comments-section { padding: 0 3rem 5rem; }
}


/* REACTIONS + COPY */
.reactions-section {
  max-width: 680px; margin: 0 auto;
  padding: 0 1.5rem 2rem;
  display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 1rem;
}
.reactions-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(14,12,10,0.35);
}
html.dark .reactions-label { color: rgba(245,240,232,0.25); }

.reactions-btns {
  display: flex; gap: 0.4rem;
}
.reaction-btn {
  background: none;
  border: 1.5px solid var(--borde);
  border-radius: 100px;
  padding: 0.4rem 0.85rem;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; gap: 0.35rem;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
  position: relative;
  font-family: 'Space Grotesk', sans-serif;
}
.reaction-btn:hover { transform: scale(1.1); border-color: var(--negro); }
html.dark .reaction-btn { border-color: rgba(245,240,232,0.15); }
html.dark .reaction-btn:hover { border-color: rgba(245,240,232,0.5); }

.reaction-btn.selected {
  background: var(--negro); border-color: var(--negro);
  transform: scale(1.12);
}
html.dark .reaction-btn.selected {

const POSTS_LOCAL = [{"slug":"lo-que-te-roba-un-trabajo-toxico","title":"Lo que te roba un trabajo tóxico (y lo que nunca te devuelve)","date":"2026-05-13","category":"trabajo","tags":["trabajo","toxicidad","salud mental","renuncia","limites"],"excerpt":"Hay ambientes de trabajo que no solo te agotan — te transforman. Te enseñan a dudar de vos, a minimizar lo que sentís, a creer que el problema sos vos. Esta es una guía para reconocerlo, y para irte.","readTime":14,"featured":true,"cover":null,"content":"<p>Hay un momento específico que muchas personas recuerdan con precisión: el momento en que se dieron cuenta de que tenían que irse. No el momento en que renunciaron — eso puede venir meses después, o nunca. El momento en que <em>supieron</em>.</p>
<p>Para algunos es un episodio puntual. Para otros es una acumulación que llega a un punto de quiebre. Para la mayoría es algo más difuso: un domingo a la tarde en que el estómago se aprieta pensando en el lunes. Una reunión en la que te das cuenta de que no recordás la última vez que dijiste algo que realmente pensabas. Un cumpleaños que no podés disfrutar porque el teléfono no para.</p>
<p>Este artículo es sobre ese momento. Y sobre todo lo que viene antes y después.</p>
<h2>Qué hace tóxico a un ambiente de trabajo</h2>
<p>La palabra &quot;tóxico&quot; se usa mucho y para todo, al punto de perder peso. Así que quiero ser específico sobre qué significa acá.</p>
<p>No hablo de trabajos difíciles. Los trabajos difíciles son parte de la vida — tienen presión, tienen conflictos, tienen momentos de fricción. Eso es normal y hasta necesario para crecer.</p>
<p>Hablo de algo diferente. Un ambiente tóxico es uno que <strong>opera a través del miedo</strong>.</p>
<p>El miedo puede tener muchas caras:</p>
<ul>
<li>El miedo a cometer un error y que eso defina cómo te ven para siempre</li>
<li>El miedo a hablar y que se use en tu contra</li>
<li>El miedo a pedir lo que necesitás (tiempo, recursos, claridad)</li>
<li>El miedo a que si te quejás, pierdas el trabajo</li>
<li>El miedo a no ser suficiente, que alguien te recuerde constantemente, de maneras sutiles o no tanto</li>
</ul>
<p>Lo tóxico no es la dificultad. Es el ambiente que se construye sobre la amenaza.</p>
<p>Y la amenaza no tiene que ser explícita. De hecho, los ambientes más tóxicos son los que la amenaza es implícita, nunca nombrada, siempre presente. Nadie te dice &quot;si hablás, te echamos&quot;. Pero todo el sistema comunica exactamente eso.</p>
<h2>Los signos que minimizamos</h2>
<p>Una de las cosas más comunes que escucho cuando alguien sale de un trabajo tóxico es: <em>&quot;¿Cómo no lo vi antes?&quot;</em></p>
<p>Lo viste. Lo que pasa es que aprendiste a no verlo, o a verlo y decirte que era normal, o a verlo y creer que era culpa tuya.</p>
<p>Algunos signos que tendemos a minimizar:</p>
<p><strong>Empezás a cambiar cómo sos en otros contextos.</strong> Esto es sutil pero muy importante. Si te das cuenta de que fuera del trabajo sos más ansioso, más irritable, menos vos — algo está pasando. El trabajo no debería filtrarse así en tu identidad.</p>
<p><strong>Justificás comportamientos que jamás aceptarías en otros vínculos.</strong> Si un amigo o pareja te hablara como te habla tu jefe, lo considerarías inaceptable. Pero en el trabajo desarrollamos una tolerancia específica para cosas que en cualquier otro contexto reconoceríamos como maltrato.</p>
<p><strong>Tu cuerpo empieza a avisarte antes que tu mente.</strong> Dolores de cabeza los domingos a la noche. Insomnio. Tensión en los hombros que no te abandona. El cuerpo no miente. Cuando la mente se convence de que &quot;es normal&quot; o &quot;no es para tanto&quot;, el cuerpo sigue llevando la cuenta.</p>
<p><strong>Dejás de tener ideas propias en el trabajo.</strong> Cuando el ambiente castiga la iniciativa, el disenso, la creatividad — empezás a no tenerlos. No como una decisión consciente sino como un mecanismo de defensa. Si proponer algo puede salir mal, mejor no proponer nada. Y después, gradualmente, dejás de ocurrirte cosas.</p>
<p><strong>Sentís alivio cuando alguien renuncia.</strong> No porque esa persona te caía mal. Sino porque confirma que se puede. Que hay una salida. Que no estás atrapado.</p>
<h2>Por qué nos quedamos</h2>
<p>Esta es la parte que menos se habla y que creo que es la más importante.</p>
<p>Nos quedamos porque <strong>el sistema tóxico nos enseña a quedarnos</strong>.</p>
<p>No es irracionalidad. No es falta de fuerza de voluntad. Es que los ambientes tóxicos son expertos en crear condiciones que hacen que irse parezca imposible, irresponsable o una señal de debilidad.</p>
<p>Algunas de las narrativas más comunes:</p>
<p><em>&quot;Si me voy, los abandono.&quot;</em> La lealtad como trampa. Te hicieron sentir tan responsable del equipo, del proyecto, de los demás, que irte se siente como una traición. Pero una organización que te necesita hasta el punto de hacerte sentir culpable por irte no es una organización sana — es una organización que depende de tu autosacrificio.</p>
<p><em>&quot;En algún momento va a mejorar.&quot;</em> El optimismo razonable se convierte en esperanza irracional cuando llevamos años esperando el cambio que nunca llega. Si el ambiente lleva tiempo siendo así y no hay señales concretas de cambio — no promesas, señales concretas — el cambio no va a venir.</p>
<p><em>&quot;¿Y si soy yo el problema?&quot;</em> Este es el más efectivo y el más dañino. Los ambientes tóxicos son maestros en hacer que las personas internalicen la responsabilidad de lo que pasa. Si siempre estás agotado, si los conflictos parecen seguirte, si nunca sentís que alcanzás el estándar — empezás a creer que el problema está en vos. A veces hay algo de autorreflexión válida ahí. Pero cuando ese pensamiento te lleva a minimizar sistemáticamente tus necesidades y a sobrejustificar los comportamientos de los demás, es una bandera roja enorme.</p>
<p><em>&quot;No puedo permitirme irme.&quot;</em> Económicamente, esto puede ser real. Y hay que tomarlo en serio — no todo el mundo tiene el privilegio de renunciar sin tener otro trabajo. Pero vale la pena preguntarse honestamente: ¿es una restricción real o es una restricción que el miedo construyó? Porque el miedo es muy bueno construyendo jaulas que parecen reales.</p>
<h2>El costo de quedarse</h2>
<p>Esto es lo que nadie te dice cuando decidís quedarte porque &quot;aguantar es ser fuerte&quot;:</p>
<p>El costo no es lineal. No es que gastas un poco de energía extra cada día y después te recuperás. Es que los ambientes tóxicos funcionan como una deuda que crece con intereses.</p>
<p>Lo que perdés al quedarte más de lo que debías:</p>
<p><strong>Confianza en tu propio criterio.</strong> Cuando tu entorno sistemáticamente invalida lo que percibís, lo que sentís, lo que pensás — empezás a dudar de vos. Después de un tiempo, ya no sabés si tu lectura de una situación es correcta. Necesitás validación externa para cosas que antes resolvías solo.</p>
<p><strong>Capacidad de disfrute.</strong> El agotamiento crónico no solo cansa el cuerpo — embota la capacidad de estar presente. Las cosas que antes te daban placer dejan de funcionar igual. No porque hayan cambiado, sino porque estás tan gastado que no podés recibirlas.</p>
<p><strong>Partes de tu identidad profesional.</strong> Si pasaste años en un ambiente que castigó tu creatividad, tu voz, tus ideas — es probable que hayas dejado de ejercerlas. Y recuperar esa capacidad después lleva tiempo. No porque se haya ido — sino porque hay que desaprender el miedo que se instaló encima.</p>
<p><strong>Tiempo.</strong> Este es el costo más concreto y el más irreversible. Dos años, cinco años, una década en un ambiente que te achicó — son años que no vuelven.</p>
<p>No escribo esto para generar culpa en quienes se quedaron. Escribo esto para que se entienda que &quot;aguantar&quot; tiene un precio real, que se paga en moneda que vale.</p>
<h2>El momento de irse</h2>
<p>¿Cómo sabés que es el momento?</p>
<p>La respuesta honesta es: probablemente ya lo sabés.</p>
<p>Pero hay algunas señales concretas que vale la pena nombrar:</p>
<p>Cuando el costo de quedarse es mayor que el miedo de irte. No cuando el miedo desaparece — el miedo casi nunca desaparece antes de irse. Sino cuando el dolor de quedarte supera al pánico de lo desconocido.</p>
<p>Cuando ya no podés imaginar que las cosas mejoren. No como pesimismo, sino como evaluación honesta de la evidencia. ¿Hubo cambios concretos? ¿Las promesas se cumplieron? ¿Las personas que toman decisiones mostraron alguna señal real de que las cosas pueden ser diferentes?</p>
<p>Cuando el trabajo empieza a afectar áreas de tu vida que antes estaban separadas. Relaciones, salud, proyectos personales, capacidad de descansar. Cuando el trabajo se filtra en todo, es porque ocupa un espacio que no le corresponde.</p>
<h2>Lo que nadie te dice sobre después</h2>
<p>Irse no es el final de la historia.</p>
<p>Hay algo que muchas personas experimentan después de salir de un ambiente tóxico que nadie predice: <strong>un período extraño de desorientación</strong>.</p>
<p>Después de un tiempo en un ambiente de alta presión y miedo, el sistema nervioso se adapta a ese estado. El peligro constante se convierte en lo normal. Y cuando el peligro desaparece, en lugar de alivio inmediato, muchas personas sienten un vacío raro. <em>¿Dónde está la amenaza? ¿Por qué no pasa nada?</em></p>
<p>Esto es normal. Es el sistema nervioso recalibrándose. Puede llevar semanas, puede llevar meses.</p>
<p>También hay culpa. Culpa por haberse ido, culpa por los que se quedan, culpa por no haberse ido antes, culpa por no haber podido &quot;hacer que funcionara&quot;.</p>
<p>Y hay algo más que pocas personas mencionan: la <strong>ira diferida</strong>. Cuando estás adentro, no podés permitirte sentir todo lo que estás sintiendo — hay demasiado en juego. Cuando salís, y el ambiente ya no te puede hacer nada, a veces aparece una bronca que no aparecía antes. Es tu sistema nervioso procesando lo que no pudo procesar en el momento.</p>
<p>Todo esto es parte de la salida. No señales de que algo está mal — señales de que algo está sanando.</p>
<h2>Una cosa más</h2>
<p>Si estás leyendo esto porque estás en un lugar que te está haciendo daño: tu percepción es válida.</p>
<p>No necesitás un episodio dramático para justificar que algo está mal. No necesitás que alguien te grite, que te traten mal de manera obvia y documentable, que haya un incidente que puedas señalar. El agotamiento sostenido, la ansiedad constante, la sensación de que te estás achicando — eso cuenta.</p>
<p>Y si estás esperando permiso para irte: no lo necesitás. Pero si te ayuda, acá está.</p>
<p>Tu bienestar no es negociable. Ningún trabajo lo vale.</p>
<hr>
<p><em>Si estás atravesando una situación de trabajo complicada y necesitás hablar con alguien, el Centro de Asistencia al Suicida (CAS) tiene una línea disponible las 24hs: 135 (desde Argentina). Y para situaciones de estrés laboral severo, la consulta con un profesional de salud mental es siempre una opción válida.</em></p>
"},{"slug":"salud-mental-no-es-lujo","title":"La salud mental no es un lujo, es un derecho","date":"2026-05-10","category":"salud","tags":["terapia","burnout","bienestar"],"excerpt":"Vivimos en una cultura que romantiza el agotamiento y patologiza el descanso. Algunas notas sobre por qué necesitamos hablar de esto diferente.","readTime":6,"featured":true,"cover":null,"content":"<p>Empezamos por el principio: en Argentina, el acceso a terapia es un privilegio. No un derecho garantizado, no algo que &quot;todo el mundo puede hacer si quiere&quot;. Un privilegio económico, geográfico, social.</p>
<p>Y sin embargo, el discurso dominante sigue siendo &quot;tenés que ir al psicólogo&quot;, como si eso fuera tan simple como ir al kiosco. Hay una brecha enorme entre lo que se recomienda y lo que es materialmente posible para la mayoría.</p>
<h2>El agotamiento como identidad</h2>
<p>Una de las cosas que más me inquieta de la cultura del trabajo contemporánea es cómo convirtió el agotamiento en señal de status. &quot;Estoy muy ocupado&quot; como respuesta de prestigio. &quot;No tengo tiempo&quot; como indicador de importancia.</p>
<blockquote>
<p>Cuando el descanso se convierte en algo que hay que justificar, algo está fundamentalmente mal con el sistema. No con vos.</p>
</blockquote>
<h2>Qué hacer con todo esto</h2>
<p>No tengo una respuesta cómoda. Sí tengo algunas convicciones:</p>
<ul>
<li>Tu estado mental no es un problema de productividad. No existís para rendir.</li>
<li>Pedir ayuda es un acto político, no una debilidad.</li>
<li>El sistema que te enferma también quiere venderte la cura.</li>
</ul>
<p>Esto es el principio de una conversación más larga. Pero tenía ganas de escribirlo hoy.</p>
"},{"slug":"burnout-que-nadie-nombra","title":"Trabajar para vivir, o el burnout que nadie quiere nombrar","date":"2026-05-03","category":"trabajo","tags":["trabajo","identidad","agotamiento"],"excerpt":"El trabajo se convirtió en identidad. Y cuando la identidad se cae, ¿qué queda?","readTime":8,"featured":false,"cover":null,"content":"<p>Hay una pregunta que me ronda desde hace meses: ¿cuándo fue que empezamos a presentarnos diciendo a qué nos dedicamos antes de decir quiénes somos?</p>
<p>&quot;Soy diseñadora.&quot; &quot;Soy abogado.&quot; &quot;Soy emprendedor.&quot; El trabajo como primera coordenada identitaria. El trabajo como lo que somos, no lo que hacemos para pagar las cuentas.</p>
<h2>El problema del burnout invisible</h2>
<p>El burnout visible es fácil de identificar: no podés levantarte de la cama, llorás en el baño de la oficina. Ese burnout al menos tiene nombre.</p>
<p>El burnout invisible es más traicionero. Es el que aparece cuando &quot;todo está bien&quot;. Cuando tenés trabajo, cuando cobrás, cuando por afuera todo parece funcionar. Pero algo adentro se fue vaciando de a poco.</p>
<blockquote>
<p>Ese burnout no se diagnostica fácil porque nadie te cree cuando decís que estás agotado si &quot;no tenés motivo&quot;.</p>
</blockquote>
<h2>Lo que el trabajo no puede darte</h2>
<p>Propósito. Comunidad. Amor. Identidad estable. El trabajo puede rozar estas cosas, pero no puede ser la fuente de ninguna de ellas.</p>
<p>No sé cómo se sale de esto sistemáticamente. Sí sé que el primer paso es nombrarlo.</p>
"},{"slug":"ser-queer-argentina-2025","title":"Ser queer en Argentina en 2025: avances, retrocesos y lo que nadie dice","date":"2026-04-28","category":"lgbtq","tags":["lgbtq+","derechos","politica"],"excerpt":"Un repaso honesto sobre dónde estamos parados después de años de lucha y de pérdidas recientes.","readTime":10,"featured":false,"cover":null,"content":"<p>Argentina tiene una historia de activismo LGBTQ+ que es, a la vez, motivo de orgullo y de advertencia. Fuimos pioneros con la ley de matrimonio igualitario en 2010, con la ley de identidad de género en 2012.</p>
<p>Y sin embargo, 2024 y 2025 vinieron con retrocesos que no esperábamos.</p>

<p>Todavía tenemos marcos legales importantes. El problema es que la ley y la práctica son dos cosas distintas.</p>

<p>No escribo esto para el pesimismo. Lo escribo porque nombrar lo que pasa es el primer paso para no normalizarlo.</p>
"},{"slug":"algoritmos-y-lo-que-no-ven","title":"Los algoritmos y lo que eligen no mostrarte","date":"2026-04-15","category":"actualidad","tags":["medios","algoritmos","informacion"],"excerpt":"Cómo los feeds construyen realidades paralelas y por qué eso importa más de lo que creemos.","readTime":7,"featured":false,"cover":null,"content":"<p>Hay algo perturbador en darse cuenta de que la información que consumís no es neutral.</p>
<h2>El problema de la cámara de eco</h2>
<p>No es solo que los algoritmos te muestran lo que ya pensás. Es que gradualmente hacen que te sea más difícil imaginar que otros puntos de vista existen.</p>

"},{"slug":"nota-personal-mudanza","title":"Una nota personal sobre mudarse y lo que dejás atrás","date":"2026-04-05","category":"personal","tags":["personal","cambio","mudanza"],"excerpt":"No todas las entradas van a ser análisis. A veces es solo esto.","readTime":4,"featured":false,"cover":null,"content":"<p>Me mudo pronto. A un lugar que no conozco del todo, con una persona que recién estoy conociendo, por razones que tienen más de impulso que de plan.</p>

// Nav scroll + reading progress + sticky header
const navEl = document.getElementById('nav');
const progressEl = document.getElementById('readingProgress');
const stickyEl   = document.getElementById('stickyRead');
const stickyBar  = document.getElementById('stickyBar');
const stickyMin  = document.getElementById('stickyMin');

window.addEventListener('scroll', () => {
  navEl.classList.toggle('scrolled', window.scrollY > 60);

  const body = document.getElementById('postBody');
  const hero = document.querySelector('.post-hero');
  if (!body) return;

  const heroBottom = hero ? hero.offsetTop + hero.offsetHeight : 300;
  const start = body.offsetTop;
  const end   = body.offsetTop + body.offsetHeight;
  const pct   = Math.max(0, Math.min(100, ((window.scrollY - start) / (end - start)) * 100));

  // Top progress bar
  progressEl.style.width = pct + '%';

  // Sticky header
  if (stickyEl) {
    stickyEl.classList.toggle('visible', window.scrollY > heroBottom - 60);
    if (stickyBar) stickyBar.style.width = pct + '%';
    if (stickyMin && window._postReadTime) {
      const remaining = Math.max(0, Math.ceil(window._postReadTime * (1 - pct / 100)));
      stickyMin.textContent = remaining <= 1 ? 'casi terminás' : remaining + ' min restantes';
    }
  }
}, { passive: true });

render();

// Setup sticky title & Giscus after render
document.addEventListener('DOMContentLoaded', () => {});
setTimeout(() => {
  const titleEl = document.getElementById('stickyTitle');
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const post = POSTS.find(p => p.slug === slug);
  if (!post) return;

  // Set sticky title & color
  if (titleEl) titleEl.textContent = post.title;
  window._postReadTime = post.readTime;
  const cat = CAT_COLORS[post.category];
  if (stickyBar) stickyBar.style.background = cat.color;

  // Load Giscus
  const container = document.getElementById('giscusContainer');
  if (container) {
    const isDark = document.documentElement.classList.contains('dark');
    const script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo',            'eytesi/estaticablog');       // ← reemplazar
    script.setAttribute('data-repo-id',         'R_kgDOSbqTAQ');               // ← de giscus.app
    script.setAttribute('data-category',        'Announcements');
    script.setAttribute('data-category-id',     'DIC_kwDOSbqTAc4C89X9');           // ← de giscus.app
    script.setAttribute('data-mapping',         'pathname');
    script.setAttribute('data-strict',          '0');
    script.setAttribute('data-reactions-enabled','1');

// Sync Giscus theme with dark mode
const _origToggleDark = typeof toggleDark !== 'undefined' ? toggleDark : null;

// ── DARK MODE ──
(function() {
  if (localStorage.getItem('estatica-theme') === 'dark')
    document.documentElement.classList.add('dark');
})();

function toggleDark() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('estatica-theme', isDark ? 'dark' : 'light');
  const btn = document.getElementById('darkToggle');
  if (btn) btn.textContent = isDark ? '☀️' : '🌙';
  // Sync Giscus theme
  const iframe = document.querySelector('iframe.giscus-frame');
  if (iframe) {
    iframe.contentWindow.postMessage(
      { giscus: { setConfig: { theme: isDark ? 'dark' : 'light' } } },
      'https://giscus.app'
    );
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('darkToggle');
  if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
});


// ── REACTIONS ──
function react(btn) {
  const slug = new URLSearchParams(window.location.search).get('slug');
  const key = 'reaction-' + slug;
  const prev = localStorage.getItem(key);
  const emoji = btn.dataset.reaction;

  document.querySelectorAll('.reaction-btn').forEach(b => {
    b.classList.remove('selected', 'pop');
  });

  if (prev === emoji) {
    // Toggle off
    localStorage.removeItem(key);
  } else {
    localStorage.setItem(key, emoji);
    btn.classList.add('selected', 'pop');
    btn.addEventListener('animationend', () => btn.classList.remove('pop'), { once: true });
  }
}

function loadReaction() {
  const slug = new URLSearchParams(window.location.search).get('slug');
  const saved = localStorage.getItem('reaction-' + slug);
  if (!saved) return;
  const btn = document.querySelector(`.reaction-btn[data-reaction="${saved}"]`);
  if (btn) btn.classList.add('selected');
}

// ── COPY LINK ──
function copyLink() {
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(window.location.href).then(() => {
    btn.textContent = '✓ ¡Copiado!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '🔗 Copiar link';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = window.location.href;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ ¡Copiado!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '🔗 Copiar link';
      btn.classList.remove('copied');
    }, 2000);
  });
}

setTimeout(loadReaction, 150);

</script>
