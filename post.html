<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTÁTICA</title>
<meta name="description" content="">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:type" content="article">
<meta property="og:image" content="">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --crema: #f5f0e8;
  --negro: #0e0c0a;
  --gris:  #6a6560;
  --borde: rgba(14,12,10,0.1);
  --trabajo:    #f5df00;
  --actualidad: #ff2566;
  --lgbtq:      #3d5aff;
  --salud:      #00d46a;
  --personal:   #ff5200;
}

html { scroll-behavior: smooth; }
body {
  background: var(--crema);
  color: var(--negro);
  font-family: 'Space Grotesk', sans-serif;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.035;
  pointer-events: none;
  z-index: 999;
}

/* PATTERNS */
.pat-lines { background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.07) 0, rgba(0,0,0,0.07) 1px, transparent 0, transparent 50%); background-size: 12px 12px; }
.pat-dots { background-image: radial-gradient(circle, rgba(0,0,0,0.15) 1.5px, transparent 1.5px); background-size: 18px 18px; }
.pat-grid { background-image: linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px); background-size: 22px 22px; }
.pat-zigzag { background-image: linear-gradient(135deg, rgba(0,0,0,0.07) 25%, transparent 25%) -10px 0, linear-gradient(225deg, rgba(0,0,0,0.07) 25%, transparent 25%) -10px 0, linear-gradient(315deg, rgba(0,0,0,0.07) 25%, transparent 25%), linear-gradient(45deg, rgba(0,0,0,0.07) 25%, transparent 25%); background-size: 20px 20px; }
.pat-arcs { background-image: radial-gradient(circle at 0 0, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 41px, transparent 41px), radial-gradient(circle at 100% 100%, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 41px, transparent 41px); background-size: 80px 80px; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  padding: 1rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.4s, backdrop-filter 0.4s, box-shadow 0.4s, border-radius 0.4s, top 0.4s, left 0.4s, right 0.4s, padding 0.4s;
}
nav.scrolled {
  background: rgba(245,240,232,0.88);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  box-shadow: 0 2px 24px rgba(14,12,10,0.08);
  border-bottom: 1px solid var(--borde);
}
@media (max-width: 767px) {
  nav.scrolled { top:0.6rem; left:0.6rem; right:0.6rem; border-radius:14px; padding:0.8rem 1.1rem; border:1px solid var(--borde); }
}
.nav-logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 16px; font-weight: 900;
  letter-spacing: -0.02em; color: var(--negro);
  text-decoration: none;
}
.nav-back {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--gris); text-decoration: none;
  display: flex; align-items: center; gap: 0.4rem;
  transition: color 0.15s;
}
.nav-back:hover { color: var(--negro); }

/* HERO */
.post-hero {
  min-height: 70svh;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 0; position: relative; overflow: hidden;
}
.post-hero-bg {
  position: absolute; inset: 0;
}
.post-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(14,12,10,0.9) 0%, rgba(14,12,10,0.4) 50%, rgba(14,12,10,0.15) 100%);
  z-index: 1;
}
.post-hero-content {
  position: relative; z-index: 2;
  padding: 2.5rem 1.5rem 2.5rem;
}
.post-cat {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 0.3rem 0.85rem; border-radius: 100px;
  margin-bottom: 1.25rem;
}
.post-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 8vw, 60px);
  font-weight: 400; font-style: italic;
  color: var(--crema); line-height: 1.08;
  letter-spacing: -0.01em; margin-bottom: 1.25rem;
}
.post-meta {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 0.75rem; font-size: 12px;
  color: rgba(245,240,232,0.5); letter-spacing: 0.04em;
}
.post-meta-sep { opacity: 0.4; }

/* TAGS */
.post-tags {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  margin-top: 1rem;
}
.post-tag {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.25rem 0.65rem; border-radius: 100px;
  border: 1.5px solid rgba(245,240,232,0.25);
  color: rgba(245,240,232,0.5);
}

/* CONTENT */
.post-body {
  max-width: 680px; margin: 0 auto;
  padding: 3rem 1.5rem 5rem;
}
.post-content {
  font-family: 'Lora', serif;
  font-size: 18px; line-height: 1.85;
  color: var(--negro);
}
.post-content p { margin-bottom: 1.5rem; }
.post-content h2 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(24px, 5vw, 32px);
  font-style: italic; font-weight: 400;
  color: var(--negro); line-height: 1.2;
  margin: 2.5rem 0 1rem;
  letter-spacing: -0.01em;
}
.post-content h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  margin: 2rem 0 0.75rem;
}
.post-content ul, .post-content ol {
  padding-left: 1.5rem; margin-bottom: 1.5rem;
}
.post-content li { margin-bottom: 0.5rem; }
.post-content strong { font-weight: 600; }
.post-content em { font-style: italic; }
.post-content a { color: inherit; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }

/* Pull quote */
.post-content blockquote {
  border-left: 3px solid var(--negro);
  padding: 0.5rem 0 0.5rem 1.5rem;
  margin: 2rem 0;
}
.post-content blockquote p {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(20px, 4vw, 26px);
  font-style: italic; font-weight: 400;
  color: var(--negro); line-height: 1.4;
  margin-bottom: 0;
}

/* Color pull quote */
.pull-quote {
  margin: 2.5rem -1.5rem;
  padding: 2rem 1.5rem;
  font-family: 'DM Serif Display', serif;
  font-size: clamp(22px, 5vw, 32px);
  font-style: italic; font-weight: 400;
  line-height: 1.35; color: var(--negro);
}

/* Divider */
.post-divider {
  width: 40px; height: 2px;
  background: var(--negro);
  margin: 2.5rem 0;
}

/* BACK SECTION */
.post-back {
  padding: 2rem 1.5rem; max-width: 680px; margin: 0 auto;
  padding-bottom: 3rem;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--borde);
}
.back-link {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--negro); text-decoration: none;
  display: flex; align-items: center; gap: 0.5rem;
  transition: gap 0.2s;
}
.back-link:hover { gap: 0.75rem; }

/* RELATED POSTS */
.related-section {
  background: var(--negro);
  padding: 3rem 1.5rem 4rem;
  margin-top: 3px;
}
.related-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.32em; text-transform: uppercase;
  color: rgba(245,240,232,0.3); margin-bottom: 1.75rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.related-label::before { content:''; width:18px; height:1px; background:rgba(245,240,232,0.2); }
.related-grid {
  display: grid; grid-template-columns: 1fr; gap: 3px;
}
.related-card {
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; justify-content: flex-end;
  position: relative; overflow: hidden;
  min-height: 160px; padding: 1.5rem;
  transition: opacity 0.2s;
}
.related-card:hover { opacity: 0.88; }
.related-pat-lines { background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.07) 0, rgba(0,0,0,0.07) 1px, transparent 0, transparent 50%); background-size: 12px 12px; }
.related-pat-dots  { background-image: radial-gradient(circle, rgba(0,0,0,0.15) 1.5px, transparent 1.5px); background-size: 18px 18px; }
.related-pat-grid  { background-image: linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px); background-size: 22px 22px; }
.related-pat-zigzag { background-image: linear-gradient(135deg, rgba(0,0,0,0.07) 25%, transparent 25%) -10px 0, linear-gradient(225deg, rgba(0,0,0,0.07) 25%, transparent 25%) -10px 0, linear-gradient(315deg, rgba(0,0,0,0.07) 25%, transparent 25%), linear-gradient(45deg, rgba(0,0,0,0.07) 25%, transparent 25%); background-size: 20px 20px; }
.related-pat-arcs  { background-image: radial-gradient(circle at 0 0, transparent 40px, rgba(0,0,0,0.06) 40px, rgba(0,0,0,0.06) 41px, transparent 41px); background-size: 80px 80px; }
.related-cat {
  display: inline-flex; font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 0.22rem 0.65rem; border-radius: 100px;
  margin-bottom: 0.6rem; position: relative; z-index: 1;
}
.related-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(18px, 4vw, 22px);
  font-weight: 400; font-style: italic;
  color: var(--negro); line-height: 1.2;
  position: relative; z-index: 1;
}
.related-meta {
  font-size: 11px; color: rgba(14,12,10,0.4);
  margin-top: 0.4rem; position: relative; z-index: 1;
  letter-spacing: 0.04em;
}

/* FOOTER */
footer {
  background: var(--negro); padding: 2.5rem 1.5rem;
}
.footer-logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 24px; font-weight: 900;
  color: var(--crema); letter-spacing: -0.02em;
  margin-bottom: 1rem; text-decoration: none; display: block;
}
.footer-copy { font-size: 11px; color: rgba(245,240,232,0.2); letter-spacing: 0.06em; }

/* READING PROGRESS BAR */
.reading-progress {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  width: 0%;
  z-index: 300;
  transition: width 0.08s linear;
  box-shadow: 0 0 8px currentColor;
}

/* SHARE */
.share-section {
  max-width: 680px; margin: 0 auto;
  padding: 0 1.5rem 2rem;
}
.share-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(14,12,10,0.35); margin-bottom: 0.85rem;
}
.share-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.share-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.6rem 1.25rem; border-radius: 100px;
  text-decoration: none; transition: all 0.15s;
  border: 1.5px solid var(--borde); color: var(--negro);
}
.share-btn:hover { background: var(--negro); color: var(--crema); border-color: var(--negro); }
.share-btn-wsp:hover { background: #25d366; border-color: #25d366; }
.share-btn-x:hover   { background: var(--negro); border-color: var(--negro); }
.not-found {
  min-height: 80vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 2rem;
}
.not-found-title {
  font-family: 'DM Serif Display', serif;
  font-size: 48px; font-style: italic; margin-bottom: 1rem;
}
.not-found-sub { color: var(--gris); font-size: 15px; margin-bottom: 2rem; }

@media (min-width: 768px) {
  nav { padding: 1.25rem 3rem; }
  .post-hero-content { padding: 4rem 3rem 3.5rem; }
  .post-body { padding: 4rem 3rem 6rem; }
  .share-section { padding: 0 3rem 2rem; }
  .pull-quote { margin: 2.5rem 0; padding: 2rem 2.5rem; }
  .related-section { padding: 4rem 3rem 5rem; }
  .related-grid { grid-template-columns: repeat(3, 1fr); }
  .post-back { padding: 2rem 3rem; }
}

/* ═══════════════════════
   DARK MODE
═══════════════════════ */
html.dark body { background: #0c0a08; color: #f5f0e8; }
html.dark nav.scrolled {
  background: rgba(12,10,8,0.9) !important;
  border-color: rgba(245,240,232,0.06) !important;
  box-shadow: 0 2px 24px rgba(0,0,0,0.4) !important;
}

/* Cards */
html.dark .post-card.card-text-only { background: #161412 !important; }

/* Post body */
html.dark .post-body { background: #0c0a08; }
html.dark .post-content { color: #f5f0e8; }
html.dark .post-content h2,
html.dark .post-content h3 { color: #f5f0e8; }
html.dark .post-content blockquote { border-color: rgba(245,240,232,0.3); }
html.dark .post-content blockquote p { color: rgba(245,240,232,0.8); }
html.dark .post-back {
  border-color: rgba(245,240,232,0.08);
  background: #0c0a08;
}
html.dark .back-link { color: #f5f0e8; }
html.dark .share-section { background: #0c0a08; }
html.dark .share-btn { color: #f5f0e8; border-color: rgba(245,240,232,0.12); }
html.dark .share-btn:hover { background: #f5f0e8; color: #0c0a08; border-color: #f5f0e8; }

/* Related */
html.dark .related-title { color: #0c0a08; }

/* FAQ (index) */
html.dark .faq-section { background: #0c0a08; }
html.dark .faq-section .section-title-light { color: #f5f0e8; }
html.dark .faq-q { color: #f5f0e8; }
html.dark .faq-a { color: rgba(245,240,232,0.5); }
html.dark .faq-item { border-color: rgba(245,240,232,0.08); }
html.dark .faq-list { border-color: rgba(245,240,232,0.08); }

/* Grid divider */
html.dark .section-divider { background: #0c0a08; }
html.dark .divider-label,
html.dark .divider-count { color: rgba(245,240,232,0.25); }
html.dark .divider-label::before { background: rgba(245,240,232,0.08); }

/* Cat filter mobile */
html.dark .cat-filter { background: #0c0a08; }
html.dark .cat-btn { color: #f5f0e8; border-color: rgba(245,240,232,0.15); }
html.dark .cat-btn.active { background: #f5f0e8; color: #0c0a08; border-color: #f5f0e8; }

/* Sobre */
html.dark .sobre-content { background: #0c0a08; }
html.dark .sobre-intro { color: #f5f0e8; }
html.dark .sobre-body { color: #f5f0e8; }
html.dark .sobre-divider { background: rgba(245,240,232,0.2); }
html.dark .sobre-redes { border-color: rgba(245,240,232,0.08); }
html.dark .sobre-redes-title { color: rgba(245,240,232,0.3); }
html.dark .red-link { color: #f5f0e8; border-color: rgba(245,240,232,0.15); }
html.dark .red-link:hover { background: #f5f0e8; color: #0c0a08; }

/* Search overlay - already dark, keep as is */

/* Empty state */
html.dark .empty-state { background: #0c0a08; }
html.dark .empty-title { color: #f5f0e8; }
html.dark .empty-sub { color: rgba(245,240,232,0.4); }

/* Other cats (categoria.html) */
html.dark .other-cats { background: #0c0a08; }
html.dark .other-cats-label { color: rgba(245,240,232,0.25); }
html.dark .other-cat-link { color: #f5f0e8; border-color: rgba(245,240,232,0.15); }
html.dark .other-cat-link:hover { background: #f5f0e8; color: #0c0a08; }

/* Dark toggle button */
.nav-dark-btn {
  background: none; border: none; cursor: pointer;
  font-size: 15px; padding: 4px;
  line-height: 1; transition: transform 0.2s;
  border: 1.5px solid var(--borde);
  border-radius: 100px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
.nav-dark-btn:hover { transform: rotate(20deg); }

</style>
</head>
<body>

<div class="reading-progress" id="readingProgress"></div>

<nav id="nav">
  <a href="./index.html" class="nav-logo">ESTÁTICA</a>
  <a href="./index.html" class="nav-back">← Volver</a>
  <button id="darkToggle" class="nav-dark-btn" onclick="toggleDark()" title="Cambiar tema">🌙</button>
</nav>

<div id="postContainer"></div>

<script>
const CAT_COLORS = {
  trabajo:    { color: 'var(--trabajo)',    text: 'var(--negro)', label: 'Trabajo',     pattern: 'pat-lines' },
  actualidad: { color: 'var(--actualidad)', text: 'white',        label: 'Actualidad',  pattern: 'pat-zigzag' },
  lgbtq:      { color: 'var(--lgbtq)',      text: 'white',        label: 'LGBTQ+',      pattern: 'pat-grid' },
  salud:      { color: 'var(--salud)',      text: 'var(--negro)', label: 'Salud mental',pattern: 'pat-dots' },
  personal:   { color: 'var(--personal)',   text: 'white',        label: 'Personal',    pattern: 'pat-arcs' },
};

// POSTS loaded from posts-data.js

function formatDate(d) {
  return new Date(d).toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function render() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const post = POSTS.find(p => p.slug === slug);
  const container = document.getElementById('postContainer');

  if (!post) {
    document.title = 'No encontrado — ESTÁTICA';
    container.innerHTML = `
      <div class="not-found">
        <div class="not-found-title">Entrada no encontrada.</div>
        <div class="not-found-sub">Puede que haya sido movida o eliminada.</div>
        <a href="./index.html" style="font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--negro);text-decoration:none;">← Volver al inicio</a>
      </div>
      <footer><a href="./index.html" class="footer-logo">ESTÁTICA</a><div class="footer-copy">© 2025 ESTÁTICA</div></footer>`;
    return;
  }

  const cat = CAT_COLORS[post.category];
  const pageUrl = window.location.href;
  const shareText = encodeURIComponent(`"${post.title}" — ESTÁTICA`);
  const shareUrl  = encodeURIComponent(pageUrl);

  // Update meta tags dynamically
  document.title = `${post.title} — ESTÁTICA`;
  document.querySelector('meta[name="description"]').setAttribute('content', post.excerpt);
  document.querySelector('meta[property="og:title"]').setAttribute('content', `${post.title} — ESTÁTICA`);
  document.querySelector('meta[property="og:description"]').setAttribute('content', post.excerpt);
  document.querySelector('meta[name="twitter:card"]'); // already set

  // Set progress bar color
  const progressBar = document.getElementById('readingProgress');
  progressBar.style.background = cat.color;
  progressBar.style.color = cat.color;

  // Related posts — same category first, then others
  const related = POSTS
    .filter(p => p.slug !== post.slug)
    .sort((a, b) => (b.category === post.category) - (a.category === post.category))
    .slice(0, 3);

  const relatedHTML = related.map(r => {
    const rc = CAT_COLORS[r.category];
    const patMap = { trabajo:'related-pat-lines', actualidad:'related-pat-zigzag', lgbtq:'related-pat-grid', salud:'related-pat-dots', personal:'related-pat-arcs' };
    return `
      <a class="related-card ${patMap[r.category]}" href="./post.html?slug=${r.slug}" style="background-color:${rc.color};">
        <span class="related-cat" style="background:${rc.color};color:${rc.text};border:1px solid rgba(0,0,0,0.12);">${rc.label}</span>
        <div class="related-title">${r.title}</div>
        <div class="related-meta">${formatDate(r.date)} · ${r.readTime} min</div>
      </a>`;
  }).join('');

  container.innerHTML = `
    <article>
      <div class="post-hero">
        <div class="post-hero-bg ${cat.pattern}" style="background-color:${cat.color};"></div>
        <div class="post-hero-overlay"></div>
        <div class="post-hero-content">
          <span class="post-cat" style="background:${cat.color};color:${cat.text};">${cat.label}</span>
          <h1 class="post-title">${post.title}</h1>
          <div class="post-meta">
            <span>${formatDate(post.date)}</span>
            <span class="post-meta-sep">·</span>
            <span>${post.readTime} min de lectura</span>
          </div>
          <div class="post-tags">
            ${post.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}
          </div>
        </div>
      </div>

      <div class="post-body" id="postBody">
        <div class="post-content">${post.content}</div>
      </div>

      <div class="post-back">
        <a href="./index.html" class="back-link">← Volver a todas las entradas</a>
        <span style="font-size:11px;color:var(--gris);letter-spacing:0.06em;">${formatDate(post.date)}</span>
      </div>

      <div class="share-section">
        <div class="share-label">Compartir esta entrada</div>
        <div class="share-btns">
          <a class="share-btn share-btn-wsp"
             href="https://wa.me/?text=${shareText}%20${shareUrl}"
             target="_blank" rel="noopener">
            💬 WhatsApp
          </a>
          <a class="share-btn share-btn-x"
             href="https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}"
             target="_blank" rel="noopener">
            𝕏 Twitter
          </a>
        </div>
      </div>
    </article>

    <div class="related-section">
      <div class="related-label">Otras señales</div>
      <div class="related-grid">${relatedHTML}</div>
    </div>

    <footer>
      <a href="./index.html" class="footer-logo">ESTÁTICA</a>
      <div class="footer-copy">© 2025 ESTÁTICA — todos los derechos reservados</div>
    </footer>`;
}

// Nav scroll + reading progress
const navEl = document.getElementById('nav');
const progressEl = document.getElementById('readingProgress');

window.addEventListener('scroll', () => {
  navEl.classList.toggle('scrolled', window.scrollY > 60);

  // Progress bar
  const body = document.getElementById('postBody');
  if (body) {
    const start = body.offsetTop;
    const end   = body.offsetTop + body.offsetHeight;
    const pct   = Math.max(0, Math.min(100, ((window.scrollY - start) / (end - start)) * 100));
    progressEl.style.width = pct + '%';
  }
}, { passive: true });

render();
</script>
</body>
</html>
